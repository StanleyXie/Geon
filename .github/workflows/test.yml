name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Run unit and integration tests
        run: bun test
      - name: Build binary
        run: bun run build
      - name: E2E Check
        run: ./dist/geon --version
      - name: Security audit
        run: bun audit
      - name: Type check
        run: bun run typecheck
